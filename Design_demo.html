        const contentFrame = document.getElementById('content-frame');

        function loadPage(idx) {
            if(pageData[idx]) {
                const html = decodeURIComponent(escape(atob(pageData[idx])));
                contentFrame.srcdoc = html;
            } else {
                contentFrame.srcdoc = "<div style='color:black; padding: 2em; font-family: sans-serif;'>Page completely missing for ID: " + idx + "</div>";
