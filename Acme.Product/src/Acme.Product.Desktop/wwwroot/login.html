<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录 - ClearVision</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="src/features/auth/auth.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="logo">
                    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M32 4L58 19V45L32 60L6 45V19L32 4Z" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="32" cy="32" r="16" stroke="currentColor" stroke-width="3"/>
                        <path d="M32 16V22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <path d="M32 42V48" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <path d="M48 32H42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <path d="M22 32H16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <circle cx="32" cy="32" r="6" fill="currentColor"/>
                    </svg>
                </div>
                <h1>ClearVision</h1>
                <p id="loginSubtitle">工业视觉检测平台</p>
            </div>

            <div class="login-mode-badge" id="loginModeBadge" hidden>首次初始化</div>

            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required placeholder="请输入用户名" autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" required placeholder="请输入密码" autocomplete="current-password">
                        <button
                            type="button"
                            class="password-toggle"
                            data-password-toggle="password"
                            tabindex="-1"
                            aria-label="显示密码">
                            <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" hidden>
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>记住用户名</span>
                    </label>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <span class="btn-text">登录</span>
                    <span class="btn-loading" hidden>
                        <svg class="spinner" viewBox="0 0 24 24" width="20" height="20">
                            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round"/>
                        </svg>
                        登录中...
                    </span>
                </button>
            </form>

            <form class="login-form" id="setupForm" hidden>
                <div class="setup-intro">
                    <h2>创建系统管理员</h2>
                    <p>当前系统还没有任何账号。请先创建首个管理员后进入软件。</p>
                </div>

                <div class="form-group">
                    <label for="setupUsername">管理员账号</label>
                    <input type="text" id="setupUsername" name="setupUsername" placeholder="请输入管理员登录名" autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="setupPassword">管理员密码</label>
                    <div class="password-wrapper">
                        <input type="password" id="setupPassword" name="setupPassword" placeholder="请输入管理员密码" autocomplete="new-password">
                        <button
                            type="button"
                            class="password-toggle"
                            data-password-toggle="setupPassword"
                            tabindex="-1"
                            aria-label="显示密码">
                            <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" hidden>
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="setupConfirmPassword">确认密码</label>
                    <div class="password-wrapper">
                        <input type="password" id="setupConfirmPassword" name="setupConfirmPassword" placeholder="请再次输入密码" autocomplete="new-password">
                        <button
                            type="button"
                            class="password-toggle"
                            data-password-toggle="setupConfirmPassword"
                            tabindex="-1"
                            aria-label="显示密码">
                            <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" hidden>
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="setup-rules">
                    <div class="setup-rules-title">账号要求</div>
                    <ul id="setupRulesList">
                        <li id="rule-username-length">用户名至少 3 位</li>
                        <li id="rule-password-length">密码长度不少于 6 位</li>
                    </ul>
                </div>

                <button type="submit" class="login-btn" id="setupBtn">
                    <span class="btn-text">创建管理员并进入系统</span>
                    <span class="btn-loading" hidden>
                        <svg class="spinner" viewBox="0 0 24 24" width="20" height="20">
                            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round"/>
                        </svg>
                        初始化中...
                    </span>
                </button>
            </form>

            <div class="login-error" id="loginError"></div>

            <div class="login-footer">
                <p id="loginFooterText">请输入现有账号登录系统。</p>
            </div>
        </div>
    </div>

    <script type="module">
        import httpClient from './src/core/messaging/httpClient.js';
        import {
            clearAuthSession,
            getStoredToken,
            storeAuthSession
        } from './src/features/auth/authStorage.js';
        import { consumeLogoutNotice } from './src/features/auth/auth.js';

        const modeBadge = document.getElementById('loginModeBadge');
        const subtitle = document.getElementById('loginSubtitle');
        const footerText = document.getElementById('loginFooterText');
        const loginForm = document.getElementById('loginForm');
        const setupForm = document.getElementById('setupForm');
        const loginError = document.getElementById('loginError');
        const loginBtn = document.getElementById('loginBtn');
        const setupBtn = document.getElementById('setupBtn');
        const setupUsername = document.getElementById('setupUsername');
        const setupPassword = document.getElementById('setupPassword');
        const setupConfirmPassword = document.getElementById('setupConfirmPassword');
        const loginUsername = document.getElementById('username');
        const loginPassword = document.getElementById('password');
        const rememberMe = document.getElementById('rememberMe');

        let setupStatus = {
            requiresInitialAdminSetup: false,
            usernameMinLength: 3,
            passwordMinLength: 6,
            requiresUppercase: false,
            requiresLowercase: false,
            requiresDigit: false
        };

        function setButtonLoading(button, isLoading) {
            button.disabled = isLoading;
            const text = button.querySelector('.btn-text');
            const loading = button.querySelector('.btn-loading');
            text.hidden = isLoading;
            loading.hidden = !isLoading;
        }

        function showError(message) {
            loginError.textContent = message || '';
            loginError.style.display = message ? 'block' : 'none';
        }

        function applySetupRules(status) {
            document.getElementById('rule-username-length').textContent = `用户名至少 ${status.usernameMinLength} 位`;
            document.getElementById('rule-password-length').textContent = `密码长度不少于 ${status.passwordMinLength} 位`;
        }

        function setMode(mode, notice = '') {
            const isSetup = mode === 'setup';
            loginForm.hidden = isSetup;
            setupForm.hidden = !isSetup;
            modeBadge.hidden = !isSetup;

            if (isSetup) {
                subtitle.textContent = '首次启动管理员初始化';
                footerText.textContent = '初始化完成后将自动登录并进入系统。';
                loginUsername.removeAttribute('required');
                loginPassword.removeAttribute('required');
                setupUsername.setAttribute('required', 'required');
                setupPassword.setAttribute('required', 'required');
                setupConfirmPassword.setAttribute('required', 'required');
                setupUsername.focus();
            } else {
                subtitle.textContent = '工业视觉检测平台';
                footerText.textContent = '请输入现有账号登录系统。';
                loginUsername.setAttribute('required', 'required');
                loginPassword.setAttribute('required', 'required');
                setupUsername.removeAttribute('required');
                setupPassword.removeAttribute('required');
                setupConfirmPassword.removeAttribute('required');
                loginUsername.focus();
            }

            showError(notice);
        }

        function bindPasswordToggles() {
            document.querySelectorAll('[data-password-toggle]').forEach(toggle => {
                toggle.addEventListener('click', event => {
                    event.preventDefault();
                    event.stopPropagation();

                    const targetId = toggle.getAttribute('data-password-toggle');
                    const input = document.getElementById(targetId);
                    if (!input) {
                        return;
                    }

                    const eyeOpen = toggle.querySelector('.eye-open');
                    const eyeClosed = toggle.querySelector('.eye-closed');
                    const reveal = input.type === 'password';

                    input.type = reveal ? 'text' : 'password';
                    eyeOpen.hidden = reveal;
                    eyeClosed.hidden = !reveal;
                    input.focus();
                });
            });
        }

        async function tryResumeSession() {
            const token = getStoredToken();
            if (!token) {
                return false;
            }

            try {
                const response = await httpClient.get('/auth/me');
                if (response) {
                    window.location.href = new URL('./index.html', window.location.href).toString();
                    return true;
                }
            } catch {
                clearAuthSession();
            }

            return false;
        }

        async function loadSetupStatus() {
            setupStatus = await httpClient.get('/auth/setup-status');
            applySetupRules(setupStatus);
            setMode(setupStatus.requiresInitialAdminSetup ? 'setup' : 'login');
        }

        async function initializePage() {
            bindPasswordToggles();

            const rememberedUsername = localStorage.getItem('cv_remembered_username');
            if (rememberedUsername) {
                loginUsername.value = rememberedUsername;
                rememberMe.checked = true;
            }

            const logoutNotice = consumeLogoutNotice();
            if (await tryResumeSession()) {
                return;
            }

            await loadSetupStatus();
            if (logoutNotice) {
                showError(logoutNotice);
            }
        }

        loginForm.addEventListener('submit', async event => {
            event.preventDefault();
            showError('');
            setButtonLoading(loginBtn, true);

            const username = loginUsername.value.trim();
            const password = loginPassword.value;

            try {
                const response = await httpClient.post('/auth/login', {
                    username,
                    password
                });

                if (!response?.token) {
                    throw new Error('登录失败，服务端未返回令牌');
                }

                storeAuthSession(response.token, response.user);
                if (rememberMe.checked) {
                    localStorage.setItem('cv_remembered_username', username);
                } else {
                    localStorage.removeItem('cv_remembered_username');
                }

                window.location.href = new URL('./index.html', window.location.href).toString();
            } catch (error) {
                console.error('登录失败:', error);
                showError(error.message || '用户名或密码错误');
            } finally {
                setButtonLoading(loginBtn, false);
            }
        });

        setupForm.addEventListener('submit', async event => {
            event.preventDefault();
            showError('');
            setButtonLoading(setupBtn, true);

            const username = setupUsername.value.trim();
            const password = setupPassword.value;
            const confirmPassword = setupConfirmPassword.value;

            try {
                const response = await httpClient.post('/auth/setup-admin', {
                    username,
                    password,
                    confirmPassword
                });

                if (!response?.token) {
                    throw new Error('初始化失败，服务端未返回令牌');
                }

                storeAuthSession(response.token, response.user);
                localStorage.setItem('cv_remembered_username', username);
                window.location.href = new URL('./index.html', window.location.href).toString();
            } catch (error) {
                console.error('管理员初始化失败:', error);

                if ((error.message || '').includes('系统已完成初始化')) {
                    loginUsername.value = username;
                    await loadSetupStatus();
                    setMode('login', error.message);
                    return;
                }

                showError(error.message || '管理员初始化失败');
            } finally {
                setButtonLoading(setupBtn, false);
            }
        });

        initializePage().catch(error => {
            console.error('登录页初始化失败:', error);
            setMode('login', error.message || '登录页初始化失败，请稍后重试');
        });
    </script>
</body>
</html>
