<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录 - ClearVision</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="src/features/auth/auth.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="logo">
                    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M32 4L58 19V45L32 60L6 45V19L32 4Z" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="32" cy="32" r="16" stroke="currentColor" stroke-width="3"/>
                        <path d="M32 16V22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <path d="M32 42V48" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <path d="M48 32H42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <path d="M22 32H16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <circle cx="32" cy="32" r="6" fill="currentColor"/>
                    </svg>
                </div>
                <h1>ClearVision</h1>
                <p>工业视觉检测平台</p>
            </div>

            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required placeholder="请输入用户名" autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" required placeholder="请输入密码" autocomplete="current-password">
                        <button type="button" class="password-toggle" id="passwordToggle" tabindex="-1" aria-label="显示密码">
                            <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>记住用户名</span>
                    </label>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <span class="btn-text">登录</span>
                    <span class="btn-loading" style="display: none;">
                        <svg class="spinner" viewBox="0 0 24 24" width="20" height="20">
                            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round"/>
                        </svg>
                        登录中...
                    </span>
                </button>
            </form>

            <div class="login-error" id="loginError"></div>

            <div class="login-footer">
                <p>首次启动会生成临时管理员密码，请按启动提示登录后立即修改。</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const toggle = document.getElementById('passwordToggle');
            const passwordInput = document.getElementById('password');
            const eyeOpen = toggle.querySelector('.eye-open');
            const eyeClosed = toggle.querySelector('.eye-closed');

            toggle.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();

                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    eyeOpen.style.display = 'none';
                    eyeClosed.style.display = 'block';
                } else {
                    passwordInput.type = 'password';
                    eyeOpen.style.display = 'block';
                    eyeClosed.style.display = 'none';
                }

                passwordInput.focus();
            });
        });
    </script>

    <script type="module">
        import httpClient from './src/core/messaging/httpClient.js';
        import {
            clearAuthSession,
            getStoredToken,
            storeAuthSession
        } from './src/features/auth/authStorage.js';

        const token = getStoredToken();
        if (token) {
            try {
                const response = await httpClient.get('/auth/me');
                if (response) {
                    window.location.href = new URL('./index.html', window.location.href).toString();
                }
            } catch {
                clearAuthSession();
            }
        }

        const rememberedUsername = localStorage.getItem('cv_remembered_username');
        if (rememberedUsername) {
            document.getElementById('username').value = rememberedUsername;
            document.getElementById('rememberMe').checked = true;
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const loginBtn = document.getElementById('loginBtn');
            const btnText = loginBtn.querySelector('.btn-text');
            const btnLoading = loginBtn.querySelector('.btn-loading');
            const errorDiv = document.getElementById('loginError');

            loginBtn.disabled = true;
            btnText.style.display = 'none';
            btnLoading.style.display = 'flex';
            errorDiv.style.display = 'none';

            try {
                const response = await httpClient.post('/auth/login', {
                    username,
                    password
                });

                if (!response?.token) {
                    throw new Error('登录失败，服务端未返回令牌');
                }

                storeAuthSession(response.token, response.user);

                if (rememberMe) {
                    localStorage.setItem('cv_remembered_username', username);
                } else {
                    localStorage.removeItem('cv_remembered_username');
                }

                window.location.href = new URL('./index.html', window.location.href).toString();
            } catch (error) {
                console.error('登录失败:', error);
                errorDiv.textContent = error.message || '用户名或密码错误';
                errorDiv.style.display = 'block';
                loginBtn.disabled = false;
                btnText.style.display = 'block';
                btnLoading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
